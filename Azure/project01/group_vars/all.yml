---
# Resource Group
myResourceGroup: zhengkai.wang

# Region
area: japaneast

# Name of VNET
myVnet: KAI-VNET-01

# VNET address space
vnetpref: 10.100.0.0/21

# Subnet Definition of DMZ
mySubnet1: DMZ-Subnet
subnetpref1: 10.100.0.0/24

# Subnet Definition of Trust
mySubnet2: Trust-Subnet
subnetpref2: 10.100.1.0/24

#Bastion Subnet
var_bastion_subnet: AzureBastionSubnet
var_bastion_pref: 10.100.7.0/26
#Bastion Name
var_bastion_name: "{{ myResourceGroup }}-Bastion"

# NSG for VMGW
pub_nsg: VMGW_NSG

# SPEC Public key
pubkey: ssh-rsa  SPEC SYSTEM RHEL8 KEY